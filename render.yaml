# TLDR; Render.com deployment config for ERIMS backend.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: erims-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: erims-api
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRES_MINUTES
        value: "60"
      # --- Set these manually in the Render dashboard (sensitive secrets) ---
      # JWT_SECRET
      # POSTGRES_HOST
      # POSTGRES_PORT
      # POSTGRES_DB
      # POSTGRES_USER
      # POSTGRES_PASSWORD
      # MONGO_HOST
      # MONGO_PORT
      # MONGO_INITDB_DATABASE
      # MONGO_INITDB_ROOT_USERNAME
      # MONGO_INITDB_ROOT_PASSWORD
      # CORS_ORIGINS  (set to your Vercel frontend URL)
